services:
  claude:
    build: .
    entrypoint: claude
    stdin_open: true  # -i
    tty: true         # -t
    volumes:
      - .:/workspace
      - claude-config:/claude-config
    environment:
      - GH_TOKEN
      - COLORTERM=truecolor
      - CLAUDE_CONFIG_DIR=/claude-config
    networks:
      - claude-net

volumes:
  claude-config:

networks:
  claude-net:
    driver: bridge

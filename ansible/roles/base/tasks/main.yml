- name: upgrade all packages
  become: true
  become_user: root
  dnf: name="*" state=latest
- name: Have common tools
  become: true
  become_user: root
  dnf: name={{item}} state=latest
  with_items:
     - git
     - wget
     - the_silver_searcher
     - htop
     - acl
     - dnf-plugins-core
     - bash-completion
     - jq
     - gnupg
     # run sudo haveged --run=0 to fill entropy pool for key generation
     - haveged
     - vim-enhanced
     - entr
     - zip
     # - fail2ban
     - httpie
     - hyperfine
     - net-tools
     - numactl
     - tmux

- name: Have SDKMan
  become: no
  shell: "curl -s 'https://get.sdkman.io' | bash"
  args:
    executable: /bin/bash
    creates: /home/build/.sdkman/bin/sdkman-init.sh

- name: Have async-profiler
  become: true
  ansible.builtin.unarchive:
    src: https://github.com/async-profiler/async-profiler/releases/download/v{{ async_profiler_version }}/async-profiler-{{ async_profiler_version }}-linux-x64.tar.gz
    dest: /opt
    remote_src: true
    creates: /opt/async-profiler-{{ async_profiler_version }}-linux-x64

- name: Have .bashrc
  copy:
    src: user_bashrc
    dest: /home/{{ user }}/.bashrc
    mode: 0644
